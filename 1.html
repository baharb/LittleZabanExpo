<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kids Dress-Up Game 🌟</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      background: linear-gradient(180deg, #87CEEB 0%, #B0E2FF 38%, #7EC87E 38%, #5DAD5D 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      font-size: 1.6rem;
      color: #FF6B35;
      text-shadow: 2px 2px 0 #FFD166;
      margin: 12px 0 4px;
    }
    .room {
      width: 100%;
      max-width: 420px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    .character-area {
      position: relative;
      width: 200px;
      height: 300px;
      margin-top: 8px;
    }
    .layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .wardrobe {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(135deg, #FFD166, #FFAA33);
      border-top: 4px solid #FF8C00;
      padding: 10px 8px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .wardrobe h2 { font-size: 1rem; color: #7B3F00; margin-bottom: 8px; }
    .items-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .item-btn {
      background: white;
      border: 3px solid #ddd;
      border-radius: 18px;
      padding: 8px 6px 4px;
      display: flex; flex-direction: column; align-items: center;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 3px 8px rgba(0,0,0,0.12);
      width: 74px;
    }
    .item-btn:active { transform: scale(0.9); }
    .item-btn.equipped {
      border-color: #4CAF50;
      box-shadow: 0 0 0 3px #A5D6A7;
    }
    .item-btn span { font-size: 0.6rem; font-weight: bold; color: #555; margin-top: 4px; text-align: center; }
  </style>
</head>
<body>

<div class="room">
  <h1>🌟 Dress Up Time! 🌟</h1>

  <!-- Sun -->
  <svg style="position:absolute;top:8px;right:16px" width="55" height="55" viewBox="0 0 60 60">
    <circle cx="30" cy="30" r="15" fill="#FFD700"/>
    <g stroke="#FFD700" stroke-width="3" stroke-linecap="round">
      <line x1="30" y1="4" x2="30" y2="12"/><line x1="30" y1="48" x2="30" y2="56"/>
      <line x1="4" y1="30" x2="12" y2="30"/><line x1="48" y1="30" x2="56" y2="30"/>
      <line x1="11" y1="11" x2="17" y2="17"/><line x1="43" y1="43" x2="49" y2="49"/>
      <line x1="49" y1="11" x2="43" y2="17"/><line x1="17" y1="43" x2="11" y2="49"/>
    </g>
  </svg>

  <!-- Cloud -->
  <svg style="position:absolute;top:14px;left:8px" width="90" height="45" viewBox="0 0 90 45">
    <ellipse cx="45" cy="32" rx="42" ry="16" fill="white"/>
    <ellipse cx="30" cy="24" rx="22" ry="18" fill="white"/>
    <ellipse cx="60" cy="22" rx="20" ry="15" fill="white"/>
  </svg>

  <div class="character-area">

    <!-- BASE CHARACTER -->
    <svg class="layer" viewBox="0 0 200 300">
      <rect x="68" y="225" width="26" height="60" rx="13" fill="#FDDBB4"/>
      <rect x="106" y="225" width="26" height="60" rx="13" fill="#FDDBB4"/>
      <ellipse cx="81" cy="283" rx="18" ry="9" fill="#C68642"/>
      <ellipse cx="119" cy="283" rx="18" ry="9" fill="#C68642"/>
      <ellipse cx="100" cy="188" rx="40" ry="48" fill="#FDDBB4"/>
      <rect x="42" y="155" width="22" height="58" rx="11" fill="#FDDBB4"/>
      <rect x="136" y="155" width="22" height="58" rx="11" fill="#FDDBB4"/>
      <rect x="88" y="125" width="24" height="24" rx="10" fill="#FDDBB4"/>
      <ellipse cx="100" cy="106" rx="46" ry="48" fill="#FDDBB4"/>
      <ellipse cx="100" cy="70" rx="46" ry="26" fill="#8B5E3C"/>
      <rect x="54" y="65" width="92" height="22" rx="10" fill="#8B5E3C"/>
      <ellipse cx="54" cy="108" rx="10" ry="13" fill="#FDDBB4"/>
      <ellipse cx="146" cy="108" rx="10" ry="13" fill="#FDDBB4"/>
      <ellipse cx="84" cy="102" rx="9" ry="10" fill="white"/>
      <ellipse cx="116" cy="102" rx="9" ry="10" fill="white"/>
      <circle cx="86" cy="103" r="6" fill="#3D2B1F"/>
      <circle cx="118" cy="103" r="6" fill="#3D2B1F"/>
      <circle cx="87" cy="101" r="2.5" fill="white"/>
      <circle cx="119" cy="101" r="2.5" fill="white"/>
      <path d="M75 90 Q84 85 93 90" stroke="#7B5230" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M107 90 Q116 85 125 90" stroke="#7B5230" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="100" cy="115" rx="5" ry="4" fill="#F0B88A"/>
      <path d="M84 126 Q100 138 116 126" stroke="#D2691E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="72" cy="118" rx="12" ry="8" fill="#FFB3BA" opacity="0.55"/>
      <ellipse cx="128" cy="118" rx="12" ry="8" fill="#FFB3BA" opacity="0.55"/>
    </svg>

    <!-- HAT -->
    <svg class="layer" id="hatLayer" viewBox="0 0 200 300" style="display:none">
      <ellipse cx="100" cy="66" rx="54" ry="11" fill="#FF6B6B"/>
      <rect x="58" y="22" width="84" height="46" rx="12" fill="#FF6B6B"/>
      <rect x="58" y="22" width="84" height="14" rx="6" fill="#FFD166"/>
      <rect x="58" y="36" width="84" height="12" fill="#06D6A0"/>
      <rect x="58" y="48" width="84" height="10" fill="#118AB2"/>
      <path d="M100 26 L104 37 L116 37 L107 44 L110 55 L100 48 L90 55 L93 44 L84 37 L96 37Z" fill="#FFD700"/>
    </svg>

    <!-- SHIRT -->
    <svg class="layer" id="shirtLayer" viewBox="0 0 200 300" style="display:none">
      <path d="M60 148 L38 155 L32 185 L56 184 L58 230 L142 230 L144 184 L168 185 L162 155 L140 148 Q100 138 60 148Z" fill="#FF6B9D"/>
      <rect x="32" y="163" width="136" height="9" fill="#FF94C2" opacity="0.55"/>
      <rect x="32" y="179" width="136" height="9" fill="#FF94C2" opacity="0.55"/>
      <rect x="32" y="195" width="136" height="9" fill="#FF94C2" opacity="0.55"/>
      <rect x="32" y="211" width="136" height="9" fill="#FF94C2" opacity="0.55"/>
      <path d="M82 146 Q100 158 118 146" stroke="white" stroke-width="3" fill="none"/>
      <circle cx="100" cy="170" r="4.5" fill="white"/>
      <circle cx="100" cy="186" r="4.5" fill="white"/>
      <path d="M60 148 L38 155 L36 192 L60 188Z" fill="#FF6B9D"/>
      <path d="M140 148 L162 155 L164 192 L140 188Z" fill="#FF6B9D"/>
    </svg>

    <!-- PANTS -->
    <svg class="layer" id="pantsLayer" viewBox="0 0 200 300" style="display:none">
      <rect x="58" y="218" width="84" height="14" rx="7" fill="#1565C0"/>
      <rect x="58" y="228" width="38" height="58" rx="12" fill="#1E88E5"/>
      <rect x="104" y="228" width="38" height="58" rx="12" fill="#1E88E5"/>
      <rect x="88" y="220" width="24" height="12" rx="4" fill="#FFD700"/>
      <rect x="64" y="236" width="22" height="16" rx="5" fill="#42A5F5" opacity="0.45"/>
      <rect x="114" y="236" width="22" height="16" rx="5" fill="#42A5F5" opacity="0.45"/>
    </svg>

    <!-- SHOES -->
    <svg class="layer" id="shoesLayer" viewBox="0 0 200 300" style="display:none">
      <rect x="58" y="268" width="32" height="14" rx="9" fill="#E53935"/>
      <ellipse cx="74" cy="281" rx="20" ry="9" fill="#E53935"/>
      <line x1="63" y1="273" x2="87" y2="273" stroke="white" stroke-width="2.5"/>
      <rect x="110" y="268" width="32" height="14" rx="9" fill="#E53935"/>
      <ellipse cx="126" cy="281" rx="20" ry="9" fill="#E53935"/>
      <line x1="115" y1="273" x2="139" y2="273" stroke="white" stroke-width="2.5"/>
    </svg>

    <!-- GLASSES -->
    <svg class="layer" id="glassesLayer" viewBox="0 0 200 300" style="display:none">
      <rect x="68" y="95" width="28" height="20" rx="10" fill="#A5D6FF" opacity="0.4"/>
      <rect x="68" y="95" width="28" height="20" rx="10" fill="none" stroke="#7B3F00" stroke-width="3"/>
      <rect x="104" y="95" width="28" height="20" rx="10" fill="#A5D6FF" opacity="0.4"/>
      <rect x="104" y="95" width="28" height="20" rx="10" fill="none" stroke="#7B3F00" stroke-width="3"/>
      <line x1="96" y1="105" x2="104" y2="105" stroke="#7B3F00" stroke-width="2.5"/>
      <line x1="54" y1="102" x2="68" y2="102" stroke="#7B3F00" stroke-width="2.5"/>
      <line x1="132" y1="102" x2="146" y2="102" stroke="#7B3F00" stroke-width="2.5"/>
    </svg>

    <!-- SCARF -->
    <svg class="layer" id="scarfLayer" viewBox="0 0 200 300" style="display:none">
      <path d="M68 138 Q100 150 132 138 Q132 158 112 162 L118 178 Q100 185 100 172 L82 178 Q68 185 72 165 Q52 158 68 138Z" fill="#FF6B35"/>
      <path d="M68 144 Q100 156 132 144" stroke="#FFD166" stroke-width="3.5" fill="none"/>
      <path d="M68 152 Q100 164 132 152" stroke="#FFD166" stroke-width="3.5" fill="none"/>
    </svg>

  </div>
</div>

<!-- WARDROBE -->
<div class="wardrobe">
  <h2>👗 Tap clothes to dress up!</h2>
  <div class="items-row">

    <button class="item-btn" id="btn-hat" onclick="toggle('hat')">
      <svg width="50" height="44" viewBox="0 0 200 110">
        <ellipse cx="100" cy="92" rx="95" ry="18" fill="#FF6B6B"/>
        <rect x="30" y="12" width="140" height="82" rx="18" fill="#FF6B6B"/>
        <rect x="30" y="12" width="140" height="22" rx="8" fill="#FFD166"/>
        <rect x="30" y="34" width="140" height="18" fill="#06D6A0"/>
        <rect x="30" y="52" width="140" height="18" fill="#118AB2"/>
        <path d="M100 16 L106 32 L124 32 L110 42 L116 58 L100 48 L84 58 L90 42 L76 32 L94 32Z" fill="#FFD700"/>
      </svg>
      <span>Rainbow Hat</span>
    </button>

    <button class="item-btn" id="btn-shirt" onclick="toggle('shirt')">
      <svg width="50" height="44" viewBox="0 0 180 130">
        <path d="M40 32 L8 48 L4 88 L34 86 L36 126 L144 126 L146 86 L176 88 L172 48 L140 32 Q90 18 40 32Z" fill="#FF6B9D"/>
        <rect x="4" y="58" width="172" height="10" fill="#FF94C2" opacity="0.6"/>
        <rect x="4" y="76" width="172" height="10" fill="#FF94C2" opacity="0.6"/>
        <circle cx="90" cy="70" r="6" fill="white"/>
      </svg>
      <span>Cute Shirt</span>
    </button>

    <button class="item-btn" id="btn-pants" onclick="toggle('pants')">
      <svg width="50" height="44" viewBox="0 0 180 130">
        <rect x="8" y="6" width="164" height="22" rx="11" fill="#1565C0"/>
        <rect x="8" y="24" width="78" height="100" rx="14" fill="#1E88E5"/>
        <rect x="94" y="24" width="78" height="100" rx="14" fill="#1E88E5"/>
        <rect x="68" y="10" width="44" height="16" rx="5" fill="#FFD700"/>
      </svg>
      <span>Cool Pants</span>
    </button>

    <button class="item-btn" id="btn-shoes" onclick="toggle('shoes')">
      <svg width="50" height="44" viewBox="0 0 180 80">
        <ellipse cx="45" cy="62" rx="42" ry="16" fill="#E53935"/>
        <rect x="8" y="40" width="74" height="28" rx="14" fill="#E53935"/>
        <line x1="18" y1="50" x2="76" y2="50" stroke="white" stroke-width="3.5"/>
        <ellipse cx="135" cy="62" rx="42" ry="16" fill="#E53935"/>
        <rect x="98" y="40" width="74" height="28" rx="14" fill="#E53935"/>
        <line x1="108" y1="50" x2="166" y2="50" stroke="white" stroke-width="3.5"/>
      </svg>
      <span>Red Shoes</span>
    </button>

    <button class="item-btn" id="btn-glasses" onclick="toggle('glasses')">
      <svg width="50" height="44" viewBox="0 0 180 70">
        <rect x="6" y="12" width="68" height="44" rx="22" fill="#A5D6FF" opacity="0.4"/>
        <rect x="6" y="12" width="68" height="44" rx="22" fill="none" stroke="#7B3F00" stroke-width="5.5"/>
        <rect x="106" y="12" width="68" height="44" rx="22" fill="#A5D6FF" opacity="0.4"/>
        <rect x="106" y="12" width="68" height="44" rx="22" fill="none" stroke="#7B3F00" stroke-width="5.5"/>
        <line x1="74" y1="34" x2="106" y2="34" stroke="#7B3F00" stroke-width="4.5"/>
      </svg>
      <span>Glasses</span>
    </button>

    <button class="item-btn" id="btn-scarf" onclick="toggle('scarf')">
      <svg width="50" height="44" viewBox="0 0 180 110">
        <path d="M18 12 Q90 36 162 12 Q162 62 128 68 L138 94 Q110 106 90 88 L70 94 Q48 106 52 72 Q16 62 18 12Z" fill="#FF6B35"/>
        <path d="M18 26 Q90 50 162 26" stroke="#FFD166" stroke-width="6" fill="none"/>
      </svg>
      <span>Scarf</span>
    </button>

  </div>
</div>

<script>
  const layers = {
    hat: document.getElementById('hatLayer'),
    shirt: document.getElementById('shirtLayer'),
    pants: document.getElementById('pantsLayer'),
    shoes: document.getElementById('shoesLayer'),
    glasses: document.getElementById('glassesLayer'),
    scarf: document.getElementById('scarfLayer'),
  };
  const equipped = {};
  function toggle(item) {
    equipped[item] = !equipped[item];
    layers[item].style.display = equipped[item] ? 'block' : 'none';
    document.getElementById('btn-' + item).classList.toggle('equipped', equipped[item]);
  }
</script>

</body>
</html>
